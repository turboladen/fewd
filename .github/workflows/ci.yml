name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cd src-tauri && cargo fmt --all -- --check

      - name: Run clippy
        run: cd src-tauri && cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cd src-tauri && cargo test --all-features

  frontend-checks:
    name: Frontend Checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup dprint
        run: cargo install dprint

      - name: Check formatting
        run: dprint check

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun test

  typos-check:
    name: Typos Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install typos
        run: brew install typos-cli

      - name: Check for typos
        run: typos --config .typos.toml

  all-checks:
    name: All Checks Passed
    needs: [rust-checks, frontend-checks, typos-check]
    runs-on: macos-latest
    steps:
      - run: echo "All checks passed!"
