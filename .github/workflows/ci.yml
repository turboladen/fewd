name: CI

# Verification jobs for open pull requests. The push-triggered dprint
# auto-formatter lives in `auto-format.yml` so the two event types don't
# produce duplicate/skipped jobs in the same workflow run.
on:
  pull_request:
    branches: [main, develop]

# Cancel older in-progress runs on the same PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: server/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # The server embeds the frontend bundle via RustEmbed (`folder =
      # "../dist"`), and the macro checks that the folder exists at compile
      # time. We don't need the real build artifacts for clippy/tests, so a
      # placeholder satisfies the macro without adding the frontend toolchain.
      - name: Create placeholder dist for RustEmbed
        run: mkdir -p dist && touch dist/.gitkeep

      - name: Check formatting
        run: cd server && cargo fmt --all -- --check

      - name: Run clippy
        run: cd server && cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cd server && cargo test --all-features

      # Boot the release binary against (a) a snapshot of the deployed
      # schema and (b) an empty DB, then probe the endpoints that 500'd
      # during fewd-nwi. Catches in-place edits to already-applied
      # migrations and release-only panics that `cargo test` misses
      # because dev-deps unify feature flags differently than the release
      # build (e.g. sea-orm-migration's SchemaManager::has_column gated on
      # sqlx-sqlite). See scripts/migration-smoke-test.sh and
      # server/tests/fixtures/schema-snapshots/README.md.
      - name: Migration drift smoke test
        run: bash scripts/migration-smoke-test.sh

  frontend-checks:
    name: Frontend Checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup dprint
        run: cargo install dprint

      - name: Check formatting
        run: dprint check

      - name: Run linter
        run: bun run lint

      - name: Run tests
        # `bun test` uses Bun's built-in runner (no jsdom); `bun run test`
        # invokes the npm script which runs vitest with the jsdom env.
        run: bun run test

  typos-check:
    name: Typos Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install typos
        run: brew install typos-cli

      - name: Check for typos
        run: typos --config .typos.toml

  all-checks:
    name: All Checks Passed
    needs: [rust-checks, frontend-checks, typos-check]
    runs-on: macos-latest
    steps:
      - run: echo "All checks passed!"
