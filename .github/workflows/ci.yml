name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a newer commit lands on the same ref. This also
# prevents the duplicate push+pull_request pair from both running to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  auto-format:
    name: Auto Format
    runs-on: macos-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup dprint
        run: cargo install dprint

      - name: Format code
        run: dprint fmt

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if ! git diff --quiet HEAD; then
            git commit -m "Auto-format code with dprint"
            git push
            echo "Code was formatted and pushed. CI will re-run with formatted code."
            exit 0
          fi

  rust-checks:
    name: Rust Checks
    runs-on: macos-latest
    # Only on PR events — the push event that initiated the PR would otherwise
    # trigger a second, redundant run.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: server/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # The server embeds the frontend bundle via RustEmbed (`folder =
      # "../dist"`), and the macro checks that the folder exists at compile
      # time. We don't need the real build artifacts for clippy/tests, so a
      # placeholder satisfies the macro without adding the frontend toolchain.
      - name: Create placeholder dist for RustEmbed
        run: mkdir -p dist && touch dist/.gitkeep

      - name: Check formatting
        run: cd server && cargo fmt --all -- --check

      - name: Run clippy
        run: cd server && cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cd server && cargo test --all-features

  frontend-checks:
    name: Frontend Checks
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup dprint
        run: cargo install dprint

      - name: Check formatting
        run: dprint check

      - name: Run linter
        run: bun run lint

      - name: Run tests
        # `bun test` uses Bun's built-in runner (no jsdom); `bun run test`
        # invokes the npm script which runs vitest with the jsdom env.
        run: bun run test

  typos-check:
    name: Typos Check
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install typos
        run: brew install typos-cli

      - name: Check for typos
        run: typos --config .typos.toml

  all-checks:
    name: All Checks Passed
    needs: [rust-checks, frontend-checks, typos-check]
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - run: echo "All checks passed!"
